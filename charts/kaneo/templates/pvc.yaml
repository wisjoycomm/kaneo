  {{- if .Values.postgresql.backup.persistence.storageClass }}
  {{- if (eq "-" .Values.postgresql.backup.persistence.storageClass) }}
  storageClassName: ""
  {{- else }}
  storageClassName: {{ .Values.postgresql.backup.persistence.storageClass }}
  {{- end }}
  {{- end }}
  resources:
    requests:
