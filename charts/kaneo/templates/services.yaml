# Kaneo Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kaneo.fullname" . }}-kaneo
  labels:
    {{- include "kaneo.labels" . | nindent 4 }}
    app.kubernetes.io/component: kaneo
spec:
  type: {{ .Values.kaneo.service.type }}
  ports:
    - port: {{ .Values.kaneo.service.port }}
      targetPort: kaneo
      protocol: TCP
      name: http
  selector:
    {{- include "kaneo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kaneo

{{- if .Values.postgresql.enabled }}
---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kaneo.fullname" . }}-postgresql
  labels:
    {{- include "kaneo.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: {{ .Values.postgresql.service.type }}
  ports:
    - port: {{ .Values.postgresql.service.port }}
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "kaneo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
{{- end }}

{{- if .Values.redis.enabled }}
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kaneo.fullname" . }}-redis
  labels:
    {{- include "kaneo.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: {{ .Values.redis.service.type }}
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "kaneo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
