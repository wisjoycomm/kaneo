# Global values
nameOverride: ""
fullnameOverride: ""
replicaCount: 1
# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
# Pod configuration
podAnnotations: {}
podSecurityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""
# PostgreSQL database configuration
postgresql:
  # Set to true to deploy PostgreSQL as part of this chart
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  # Database configuration
  auth:
    database: kaneo
    username: kaneo_user
    password: kaneo_password
    # Use existing secret for database credentials (optional)
    existingSecret: ""
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  # Persistence for PostgreSQL data
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  # PostgreSQL service configuration
  service:
    type: ClusterIP
    port: 5432
  # Resources for PostgreSQL
  resources: {}
  # resources:
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi
  # Scheduled backup of the PostgreSQL data via pg_dump (only used when postgresql.enabled)
  backup:
    enabled: false
    # Standard cron schedule, default: daily at 02:00
    schedule: "0 2 * * *"
    # How many days of dumps to keep in the backup PVC
    retentionDays: 7
    image:
      repository: postgres
      tag: 16-alpine
      pullPolicy: IfNotPresent
    persistence:
      size: 8Gi
      storageClass: ""
      accessMode: ReadWriteOnce
    resources: {}
# Redis configuration, used for multi-instance WebSocket pub/sub (REDIS_URL).
# Single-instance deployments don't need this - Kaneo falls back to in-memory pub/sub.
redis:
  # Set to true to deploy a single-pod Redis as part of this chart and wire REDIS_URL automatically.
  enabled: false
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources: {}
  # Use an external Redis / Sentinel / cluster instead of the in-chart deployment.
  # Set redis.enabled=false and provide the full connection string here.
  externalUrl: ""
# Kaneo application configuration (combined API + web frontend)
kaneo:
  image:
    repository: ghcr.io/usekaneo/kaneo
    # Defaults to Chart.appVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent
  securityContext: {}
  service:
    type: ClusterIP
    port: 5173
    targetPort: 5173
  # Resources are optional and disabled by default
  resources: {}
  # resources:
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi

  env:
    # Public URL of this Kaneo instance (e.g. https://kaneo.example.com)
    # KANEO_API_URL is derived automatically as clientUrl/api if not set
    clientUrl: ""
    # Allowed CORS origins. Accepts a comma-separated string or YAML list.
    # Defaults to clientUrl when left empty.
    corsOrigins: []
    # Required Better Auth secret (minimum 32 characters), unless existingSecret is enabled.
    # Generate with: openssl rand -hex 32
    authSecret: ""
    existingSecret:
      enabled: false
      name: ""
      key: auth-secret
    disableRegistration: false
    disablePasswordRegistration: false
    disableEmailOtpSignIn: false
    # Database configuration
    database:
      # Use external PostgreSQL (set postgresql.enabled to false)
      # Important: when using external postgres, make sure you have set up the db user correctly:
      #   CREATE DATABASE kaneo;
      #   CREATE USER kaneo_user WITH PASSWORD 'your_password';
      #   GRANT ALL PRIVILEGES ON DATABASE kaneo TO kaneo_user;
      #   \c kaneo;
      #   GRANT USAGE ON SCHEMA public TO kaneo_user;
      #   GRANT CREATE ON SCHEMA public TO kaneo_user;
      #   ALTER SCHEMA public OWNER TO kaneo_user;
      external:
        enabled: false
        host: ""
        port: 5432
        database: kaneo
        username: kaneo_user
        password: ""
        # Use existing secret for external database credentials in the form of a uri, e.g.: "postgresql://user:pass@host:port/db"
        existingSecret:
          enabled: false
          name: ""
          passwordKey: postgres_uri
  # Additional environment variables for the kaneo container.
  # Each entry is a standard Kubernetes EnvVar (supports `value` or `valueFrom`).
  # Useful for CUSTOM_OAUTH_*, SMTP_*, etc. without editing the chart.
  # extraEnv entries are appended after chart-defined vars; duplicate names override.
  extraEnv: []
  # extraEnv:
  #   - name: CUSTOM_OAUTH_DISCOVERY_URL
  #     value: "https://idp.example.com/.well-known/openid-configuration"
  #   - name: CUSTOM_OAUTH_CLIENT_ID
  #     valueFrom:
  #       secretKeyRef:
  #         name: oauth-secret
  #         key: client-id
  livenessProbe:
    httpGet:
      path: /api/health
      port: kaneo
    initialDelaySeconds: 60
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/health
      port: kaneo
    initialDelaySeconds: 30
    periodSeconds: 10
# Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: kaneo.local
      paths:
        - path: /
          pathType: Prefix
          service: kaneo
          port: 5173
  tls: []

# Gateway API configuration
gateway:
  enabled: false
  annotations: {}
  labels: {}
  parentRefs: []
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - service: kaneo
          port: 5173
