suite: hpa
templates:
  - hpa.yaml
tests:
  - it: renders nothing when autoscaling is disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an HPA with configured min/max replicas when enabled
    set:
      autoscaling.enabled: true
      autoscaling.minReplicas: 2
      autoscaling.maxReplicas: 6
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 6
